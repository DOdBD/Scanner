<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Domain Stack Scanner</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F8FAFC; color: #1A2B4A; }
  .header { background: #1A2B4A; padding: 22px 18px 18px; border-bottom: 3px solid #00B4A0; }
  .header .wrap { max-width: 760px; margin: 0 auto; }
  .title-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
  .title { color: #fff; font-size: 18px; font-weight: 800; }
  .live { background: #00B4A0; color: #fff; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; }
  .sub { color: #94A3B8; font-size: 12px; }
  .container { max-width: 760px; margin: 0 auto; padding: 22px 16px; }
  .inputrow { display: flex; gap: 8px; margin-bottom: 8px; }
  .emailrow { display: flex; gap: 8px; margin-bottom: 18px; }
  input { flex: 1; padding: 12px 14px; font-size: 15px; border: 2px solid #E5E7EB; border-radius: 8px; outline: none; }
  input:focus { border-color: #00B4A0; }
  input.small { font-size: 13px; padding: 10px 14px; }
  button { background: #00B4A0; color: #fff; border: none; border-radius: 8px; padding: 12px 18px; font-size: 14px; font-weight: 700; cursor: pointer; white-space: nowrap; }
  button:disabled { background: #94A3B8; }
  .stage { font-size: 13px; color: #00B4A0; font-weight: 600; margin-bottom: 14px; }
  .err { background: #FEF2F2; border: 1px solid #FCA5A5; border-radius: 8px; padding: 12px 14px; color: #DC2626; font-size: 13px; margin-bottom: 18px; }
  .summary { background: #1A2B4A; border-radius: 10px; padding: 13px 16px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .dom { color: #00B4A0; font-weight: 800; font-size: 16px; }
  .scanned { color: #64748B; font-size: 12px; margin-left: 8px; }
  .pill { font-size: 11px; padding: 3px 9px; border-radius: 4px; font-weight: 600; display: inline-block; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  @media (max-width: 520px) { .grid2 { grid-template-columns: 1fr; } }
  .card { background: #fff; border: 1px solid #E5E7EB; border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; }
  .card-head { display: flex; align-items: center; gap: 7px; margin-bottom: 9px; }
  .card-icon { font-size: 16px; }
  .card-title { font-weight: 700; font-size: 13px; }
  .card-hint { font-size: 11px; color: #9CA3AF; }
  .empty { color: #9CA3AF; font-size: 13px; }
  .tag { display: inline-flex; align-items: center; border-radius: 6px; padding: 3px 10px; font-size: 12px; font-weight: 600; margin: 3px 3px; }
  .mono { font-family: monospace; font-size: 11px; color: #374151; }
  .spf-box { font-family: monospace; font-size: 11px; color: #6B7280; background: #F9FAFB; padding: 8px 10px; border-radius: 6px; word-break: break-all; }
  .empty-state { text-align: center; padding: 40px 0; color: #9CA3AF; }
  .empty-state .big { font-size: 46px; margin-bottom: 10px; }
  .score-block { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
  .score-num { font-size: 42px; font-weight: 800; line-height: 1; }
  .score-label { font-size: 11px; color: #6B7280; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
  .score-meta { font-size: 13px; color: #374151; margin-top: 2px; }
  .bot-row { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #F3F4F6; font-size: 13px; }
  .bot-row:last-child { border-bottom: none; }
  .bot-name { color: #374151; font-weight: 500; }
  .bot-status-ok { color: #16A34A; font-weight: 700; font-size: 12px; }
  .bot-status-no { color: #DC2626; font-weight: 700; font-size: 12px; }
  .meta-row { display: flex; gap: 6px; margin-bottom: 7px; font-size: 13px; }
  .meta-key { color: #9CA3AF; font-weight: 600; min-width: 120px; flex-shrink: 0; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
  .meta-val { color: #1A2B4A; word-break: break-word; }
  .report-meta { display: none; }
  @media print {
    body { background: #fff; }
    .header { background: #1A2B4A !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .inputrow, .emailrow, #stage, #emptyState { display: none !important; }
    .live { display: none; }
    .report-meta { display: block; font-size: 11px; color: #6B7280; margin-bottom: 14px; }
    .card, .summary, .grid2 > div { break-inside: avoid; page-break-inside: avoid; }
    .summary { background: #1A2B4A !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .tag, .pill { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .container { padding-top: 10px; }
  }
</style>
</head>
<body>
<div class="header"><div class="wrap">
  <div class="title-row">
    <span style="font-size:21px">🔍</span>
    <span class="title">Domain Stack Scanner</span>
    <span class="live">LIVE</span>
  </div>
  <div class="sub">DNS · MX · TXT · SPF · DMARC · HTTP headers · GEO analysis · AI crawler access. Server-side, no CORS limits.</div>
</div></div>

<div class="container">
  <div class="inputrow">
    <input id="domainInput" placeholder="clay.com" autocapitalize="off" autocorrect="off" spellcheck="false">
    <button id="scanBtn">Scan</button>
    <button id="exportBtn" title="Export as PDF" style="display:none;background:#1A2B4A;padding:12px 14px">⬇ PDF</button>
  </div>
  <div class="emailrow">
    <input id="emailInput" class="small" type="email" placeholder="email (optional — stored as lead)" autocapitalize="off" autocorrect="off" spellcheck="false">
  </div>
  <div id="stage" class="stage" style="display:none"></div>
  <div id="error" class="err" style="display:none"></div>
  <div id="results"></div>
  <div id="emptyState" class="empty-state">
    <div class="big">🔬</div>
    <p style="font-size:14px">Enter any domain to see their full tech stack and AI presence.</p>
    <p style="font-size:12px;color:#CBD5E1;margin-top:6px">Try: clay.com, hubspot.com, stripe.com</p>
  </div>
</div>

<script>
/* ─── Config ─────────────────────────────────────────────────────────────── */
const API_URL = 'http://localhost:8000';

/* ─── Helpers ────────────────────────────────────────────────────────────── */
const uniq = a => [...new Set(a)];
function esc(s){ return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
function tag(label,color){ return `<span class="tag" style="background:${color}18;color:${color};border:1px solid ${color}40">${esc(label)}</span>`; }
function secBadge(hasDmarc,pol){
  if(!hasDmarc) return `<span class="pill" style="background:#FEE2E2;color:#DC2626">⚠ No DMARC</span>`;
  const strong=pol==="reject",mid=pol==="quarantine";
  const bg=strong?"#D1FAE5":mid?"#FEF3C7":"#FEE2E2", fg=strong?"#065F46":mid?"#92400E":"#DC2626";
  return `<span class="pill" style="background:${bg};color:${fg}">DMARC: ${esc(pol)}</span>`;
}
function card(icon,title,inner,hint){
  const h=hint?`<span class="card-hint">${esc(hint)}</span>`:"";
  return `<div class="card"><div class="card-head"><span class="card-icon">${icon}</span><span class="card-title">${title}</span>${h}</div>${inner}</div>`;
}
function emptyOr(arr,html){ return arr.length ? html : `<span class="empty">Nothing detected</span>`; }

const SEC_HEADER_LABELS = {
  'strict-transport-security':'HSTS','content-security-policy':'CSP',
  'x-frame-options':'X-Frame-Options','x-content-type-options':'X-Content-Type-Options',
  'referrer-policy':'Referrer-Policy','permissions-policy':'Permissions-Policy'
};

function scoreColor(n){
  if(n==null) return '#9CA3AF';
  if(n>=80) return '#16A34A';
  if(n>=50) return '#D97706';
  return '#DC2626';
}

function botRow(label,allowed){
  if(allowed==null) return '';
  const cls=allowed?'bot-status-ok':'bot-status-no';
  const txt=allowed?'✓ Allowed':'✗ Blocked';
  return `<div class="bot-row"><span class="bot-name">${esc(label)}</span><span class="${cls}">${txt}</span></div>`;
}

/* ─── Scan ───────────────────────────────────────────────────────────────── */
const el = id => document.getElementById(id);

async function scan(){
  el("error").style.display="none";
  el("results").innerHTML="";
  el("emptyState").style.display="none";

  let d = el("domainInput").value.trim().toLowerCase()
    .replace(/^https?:\/\//,"").replace(/^www\./,"").split("/")[0];
  if(!d || !d.includes(".")){
    el("error").textContent="Enter a valid domain like clay.com";
    el("error").style.display="block";
    el("emptyState").style.display="block";
    return;
  }

  const email = el("emailInput").value.trim() || null;
  const btn=el("scanBtn"); btn.disabled=true; btn.textContent="Scanning...";
  const stage=el("stage"); stage.style.display="block";
  stage.textContent="Scanning domain via backend...";

  try{
    const res = await fetch(`${API_URL}/scan`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({domain: d, email})
    });
    if(!res.ok){
      const err = await res.json().catch(()=>({detail:"Unknown error"}));
      throw new Error(err.detail || `HTTP ${res.status}`);
    }
    const data = await res.json();
    data._scannedAt = new Date().toLocaleTimeString();
    data._scannedFull = new Date().toLocaleString();
    window._lastReport = data;
    render(data);
    el("exportBtn").style.display="block";
  }catch(e){
    console.error(e);
    el("error").textContent = `Scan failed: ${e.message}`;
    el("error").style.display="block";
  }finally{
    btn.disabled=false; btn.textContent="Scan"; stage.style.display="none";
  }
}

/* ─── Render ─────────────────────────────────────────────────────────────── */
function render(r){
  const hosting = uniq([...(r.cdn||[]), ...(r.hosting||[])]);
  const secLabels = (r.security_headers||[]).map(h => SEC_HEADER_LABELS[h] || h);
  const score = r.geo_ai_readiness_score;
  const sslIssuers = r.ssl_issuer ? [r.ssl_issuer] : [];

  let html = "";

  // ── Report meta (print only) ─────────────────────────────────────────────
  html += `<div class="report-meta">
    <strong>Domain intelligence report</strong> &nbsp;·&nbsp; ${esc(r.domain)} &nbsp;·&nbsp; ${esc(r._scannedFull)}<br>
    ${r.inferred_country ? `<strong>Country:</strong> ${esc(r.inferred_country)} &nbsp;·&nbsp; ` : ""}
    <strong>AI readiness score:</strong> ${score != null ? score+"/100" : "N/A"}<br>
    ${r.geo_positioning ? `<strong>Positioning:</strong> ${esc(r.geo_positioning)}` : ""}
  </div>`;

  // ── Summary bar ──────────────────────────────────────────────────────────
  const scorePill = score != null
    ? `<span class="pill" style="background:${scoreColor(score)}18;color:${scoreColor(score)}">AI-ready: ${score}/100</span>`
    : "";
  const countryPill = r.inferred_country
    ? `<span class="pill" style="background:#EEF2FF;color:#4338CA">${esc(r.inferred_country)}</span>`
    : "";
  html += `<div class="summary">
    <div><span class="dom">${esc(r.domain)}</span><span class="scanned">scanned ${esc(r._scannedAt)}</span></div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      ${secBadge(r.dmarc_configured, r.dmarc_policy)}
      ${scorePill}
      <span class="pill" style="background:#F0FDFA;color:#0F766E">${secLabels.length}/6 sec headers</span>
      ${countryPill}
    </div></div>`;

  // ── Email provider + DNS host ─────────────────────────────────────────────
  html += `<div class="grid2">
    ${card("📧","Email provider", emptyOr(r.email_provider?[1]:[], r.email_provider?tag(r.email_provider,"#00B4A0"):""))}
    ${card("🌐","DNS host", emptyOr(r.dns_host?[1]:[], r.dns_host?tag(r.dns_host,"#1A2B4A"):""))}
  </div>`;

  // ── CDN & hosting + web server ────────────────────────────────────────────
  html += `<div class="grid2">
    ${card("☁️","CDN & Hosting", emptyOr(hosting, hosting.map(t=>tag(t,"#0EA5E9")).join("")))}
    ${card("🖥","Web server", emptyOr(r.web_server||[], (r.web_server||[]).map(t=>tag(t,"#64748B")).join("")))}
  </div>`;

  // ── Verified vendors ──────────────────────────────────────────────────────
  const vendors = r.verified_vendors || [];
  html += card("✅","Verified vendors &amp; AI tools", emptyOr(vendors, vendors.map(t=>{
    const ai = t.includes("OpenAI")||t.includes("Anthropic");
    return tag(t, ai?"#16A34A":"#0891B2");
  }).join("")), "from domain verification records");

  // ── GEO synthesis ─────────────────────────────────────────────────────────
  const gaps = r.geo_gaps || [];
  let geoInner = "";
  if(score != null){
    geoInner += `<div class="score-block">
      <div>
        <div class="score-num" style="color:${scoreColor(score)}">${score}</div>
        <div class="score-label">AI readiness / 100</div>
      </div>
      <div style="flex:1">
        ${r.geo_tone_of_voice ? `<span class="pill" style="background:#F3F4F6;color:#374151;margin-right:4px">${esc(r.geo_tone_of_voice)}</span>` : ""}
        ${gaps.map(g=>tag(g,"#DC2626")).join("")}
      </div>
    </div>`;
  }
  if(r.geo_positioning){
    geoInner += `<div class="meta-row"><span class="meta-key">Positioning</span><span class="meta-val">${esc(r.geo_positioning)}</span></div>`;
  }
  if(r.geo_target_market){
    geoInner += `<div class="meta-row"><span class="meta-key">Target market</span><span class="meta-val">${esc(r.geo_target_market)}</span></div>`;
  }
  if(!geoInner) geoInner = `<span class="empty">GEO analysis not available</span>`;
  html += card("🤖","GEO Analysis", geoInner, "Claude synthesis");

  // ── AI crawler access ─────────────────────────────────────────────────────
  let crawlerInner = "";
  if(!r.robots_txt_found){
    crawlerInner += `<div style="font-size:13px;color:#6B7280;margin-bottom:10px">No robots.txt found — all bots implicitly allowed.</div>`;
  }
  crawlerInner += botRow("GPTBot (ChatGPT)", r.robots_txt_allows_gptbot);
  crawlerInner += botRow("ClaudeBot (Anthropic)", r.robots_txt_allows_claudebot);
  crawlerInner += botRow("PerplexityBot", r.robots_txt_allows_perplexity);
  crawlerInner += botRow("Google-Extended", r.robots_txt_allows_google_extended);
  crawlerInner += `<div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">`;
  const llmsColor = r.llms_txt_found ? "#16A34A" : "#DC2626";
  const llmsLabel = r.llms_txt_found ? "✓ llms.txt found" : "✗ No llms.txt";
  crawlerInner += `<span class="pill" style="background:${llmsColor}18;color:${llmsColor}">${llmsLabel}</span>`;
  if(r.llms_full_txt_found){
    crawlerInner += `<span class="pill" style="background:#16A34A18;color:#16A34A">✓ llms-full.txt found</span>`;
  }
  const sitemapLabel = r.sitemap_found
    ? `✓ Sitemap (${r.sitemap_page_count||"?"} URLs)`
    : "✗ No sitemap";
  const sitemapColor = r.sitemap_found ? "#0891B2" : "#6B7280";
  crawlerInner += `<span class="pill" style="background:${sitemapColor}18;color:${sitemapColor}">${sitemapLabel}</span>`;
  crawlerInner += `</div>`;
  html += card("🕷️","AI Crawler Access", crawlerInner, "robots.txt + llms.txt");

  // ── CMS / CRM / Marketing / Internal tools ────────────────────────────────
  html += card("📝","CMS / Website platform", emptyOr(r.cms||[], (r.cms||[]).map(t=>tag(t,"#DB2777")).join("")));
  html += card("📊","CRM", emptyOr(r.crm||[], (r.crm||[]).map(t=>tag(t,"#7C3AED")).join("")));
  html += card("📣","Marketing &amp; email tools", emptyOr(r.marketing_tools||[], (r.marketing_tools||[]).map(t=>tag(t,"#EA580C")).join("")));
  html += card("🛠","Internal tools", emptyOr(r.internal_tools||[], (r.internal_tools||[]).map(t=>tag(t,"#D97706")).join("")));

  // ── IPs + SSL issuer ──────────────────────────────────────────────────────
  const ipv4 = r.ipv4_addresses || [];
  const ipv6 = r.ipv6_addresses || [];
  const ipInner = (ipv4.length||ipv6.length)
    ? ipv4.map(ip=>`<div class="mono">${esc(ip)}</div>`).join("")
      + ipv6.map(ip=>`<div class="mono" style="font-size:10px;color:#9CA3AF">${esc(ip)}</div>`).join("")
    : `<span class="empty">Nothing detected</span>`;
  html += `<div class="grid2">
    ${card("📍","IP addresses", ipInner)}
    ${card("🔐","SSL issuer (CAA)", emptyOr(sslIssuers, sslIssuers.map(c=>tag(c,"#059669")).join("")))}
  </div>`;

  // ── Email security ────────────────────────────────────────────────────────
  const spfOk = r.spf_configured;
  const senders = r.spf_senders || [];
  let secInner = `<div style="display:flex;gap:6px;flex-wrap:wrap;${spfOk||senders.length?"margin-bottom:9px":""}">
    ${secBadge(r.dmarc_configured, r.dmarc_policy)}
    ${spfOk
      ? `<span class="pill" style="background:#D1FAE5;color:#065F46">SPF configured</span>`
      : `<span class="pill" style="background:#FEE2E2;color:#DC2626">⚠ No SPF</span>`}
  </div>`;
  if(spfOk && senders.length){
    secInner += `<div style="margin-top:4px;font-size:11px;color:#6B7280;margin-bottom:4px">Authorized senders:</div>`;
    secInner += senders.map(s=>tag(s,"#475569")).join("");
  }
  if(secLabels.length){
    secInner += `<div style="margin-top:10px;font-size:11px;color:#6B7280;margin-bottom:4px">Security headers (${secLabels.length}/6):</div>`;
    secInner += secLabels.map(l=>tag(l,"#059669")).join("");
  }
  html += card("🛡","Email & web security", secInner);

  // ── Homepage content ──────────────────────────────────────────────────────
  let pageInner = "";
  if(r.homepage_title) pageInner += `<div class="meta-row"><span class="meta-key">Title</span><span class="meta-val">${esc(r.homepage_title)}</span></div>`;
  if(r.homepage_description) pageInner += `<div class="meta-row"><span class="meta-key">Description</span><span class="meta-val">${esc(r.homepage_description)}</span></div>`;
  if(r.homepage_og_title && r.homepage_og_title !== r.homepage_title)
    pageInner += `<div class="meta-row"><span class="meta-key">OG title</span><span class="meta-val">${esc(r.homepage_og_title)}</span></div>`;
  if(r.schema_org_type) pageInner += `<div class="meta-row"><span class="meta-key">Schema.org type</span><span class="meta-val">${esc(r.schema_org_type)}</span></div>`;
  if(r.homepage_word_count) pageInner += `<div class="meta-row"><span class="meta-key">Word count</span><span class="meta-val">${r.homepage_word_count.toLocaleString()}</span></div>`;
  if(!pageInner) pageInner = `<span class="empty">Homepage data not available</span>`;
  html += card("📄","Homepage content", pageInner);

  el("results").innerHTML = html;
}

/* ─── Events ─────────────────────────────────────────────────────────────── */
el("scanBtn").addEventListener("click", scan);
el("domainInput").addEventListener("keydown", e=>{ if(e.key==="Enter") scan(); });
el("exportBtn").addEventListener("click", function(){
  const r = window._lastReport;
  if(r) document.title = "stack-report-" + r.domain + "-" + new Date().toISOString().slice(0,10);
  window.print();
});
</script>
</body>
</html>
